app = "schoolportaal"
primary_region = "ams"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  FLASK_DEBUG = "0"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines = 0
  max_machines = 1